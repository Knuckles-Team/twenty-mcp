repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: local
    hooks:
    - id: check-mermaid
      name: Check Mermaid syntax
      entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/mermaid_linter.py
      language: system
      files: \.md$
      pass_filenames: true
    - id: check-stubs
      name: Check for Active Stubs and TODOs
      entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_stubs.py
      language: system
      types: [python]
    - id: mcp-readme-table
      name: sync MCP tools table in README
      entry: |-
        bash -c 'if [ -f uv.lock ]; then uv run python -m agent_utilities.mcp.readme_tools; else python -m agent_utilities.mcp.readme_tools; fi'
      language: system
      files: ^(README\.md|.*/mcp_server\.py|.*/mcp/.*\.py)$
      pass_filenames: false
